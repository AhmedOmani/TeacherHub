name: TeacherHub Pro CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Phase 1: Automated Testing
  test:
    name: Build & Run Automated Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Vitest Suite (Unit & Integration)
        run: npm run test

      - name: Verify Production Build
        run: npm run build

  # Phase 2: Secure Auto-Deployment (Only fires if 'test' job passes on 'main')
  deploy:
    name: Deploy to Firebase Hosting (Free CDN)
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - run: npm ci
      - run: npm run build

      # Note: To activate this, generate a Firebase Service Account key in your Firebase project settings
      # and add it to your GitHub Repository Secrets as FIREBASE_SERVICE_ACCOUNT.
      # Also update the projectId to match your Firebase project name.
      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          channelId: live
          projectId: teacherhub-pro-1a2b3 # <-- UPDATE THIS TO YOUR FIREBASE PROJECT ID
